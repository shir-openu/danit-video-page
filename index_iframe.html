<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background: transparent;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* --- Floating Danit video --- */
        #floating-video {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 220px;
            height: 220px;
            z-index: 999999;
            cursor: grab;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            border: 3px solid #fff;
            transition: box-shadow 0.3s;
        }
        #floating-video:hover { box-shadow: 0 4px 32px rgba(0,0,0,0.7); }
        #floating-video:active { cursor: grabbing; }
        #floating-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* --- Controls --- */
        #vid-controls {
            position: fixed;
            top: 198px;
            right: 16px;
            z-index: 1000000;
            display: flex;
            gap: 4px;
        }
        #vid-controls button {
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 14px;
            line-height: 28px;
            text-align: center;
        }
        #vid-controls button:hover { background: rgba(0,0,0,0.85); }

        /* --- Hint --- */
        .tap-hint {
            position: fixed;
            top: 240px;
            right: 16px;
            width: 220px;
            text-align: center;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 999999;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        /* --- Background iframe --- */
        #bg-iframe {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 0;
        }

        /* --- Content iframe (for scheduled pages) --- */
        #content-area {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
        }
        #content-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            display: none;
        }

        /* --- Floating media overlay --- */
        #media-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 500;
            display: none;
            pointer-events: none;
            overflow: hidden;
        }
        .float-item {
            position: absolute;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.8s ease-in;
        }
        .float-item.visible { opacity: 1; }
        .float-item img, .float-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Gentle floating animation */
        @keyframes floatA { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes floatB { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes floatC { 0%,100% { transform: translateY(-5px); } 50% { transform: translateY(7px); } }

        .float-item:nth-child(1) { animation: floatA 4s ease-in-out infinite; }
        .float-item:nth-child(2) { animation: floatB 5s ease-in-out infinite 0.5s; }
        .float-item:nth-child(3) { animation: floatC 4.5s ease-in-out infinite 1s; }
        .float-item:nth-child(4) { animation: floatA 5.5s ease-in-out infinite 0.3s; }
        .float-item:nth-child(5) { animation: floatB 4.2s ease-in-out infinite 0.8s; }
        .float-item:nth-child(6) { animation: floatC 5s ease-in-out infinite 0.2s; }
        .float-item:nth-child(7) { animation: floatA 4.8s ease-in-out infinite 0.6s; }

        /* --- Progress bar --- */
        #progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 4px;
            background: #6366f1;
            z-index: 999999;
            transition: width 0.3s;
            width: 0%;
        }
    </style>
</head>
<body>
    <!-- Floating Danit -->
    <div id="floating-video">
        <video id="vid" playsinline preload="auto" autoplay muted>
            <source src="danit_hila_message_hedra.mp4" type="video/mp4">
        </video>
    </div>
    <div id="vid-controls">
        <button id="btn-mute" title="Mute/Unmute">🔊</button>
    </div>
    <div class="tap-hint" id="hint">לחצו במקום כלשהו לשמיעת הקול</div>

    <!-- Default background: direction field page -->
    <iframe id="bg-iframe"
            src="https://shir-openu.github.io/example_second_order_direction_field_enrichment/"
            sandbox="allow-scripts allow-same-origin allow-popups"></iframe>

    <!-- Floating media overlay (0:35 - 0:55) -->
    <div id="media-overlay">
        <!-- 1. Paraboloid heatmap (top-left) -->
        <div class="float-item" style="top:3%; left:2%; width:200px; height:200px;">
            <img src="media/paraboloid_heatmap.png" alt="paraboloid">
        </div>
        <!-- 2. Paraboloid sections (top-center-left) -->
        <div class="float-item" style="top:5%; left:22%; width:180px; height:140px;">
            <video autoplay muted loop playsinline>
                <source src="media/paraboloid_sections.webm" type="video/webm">
            </video>
        </div>
        <!-- 3. Isoclines animation (top-center-right) -->
        <div class="float-item" style="top:2%; left:42%; width:170px; height:140px;">
            <video autoplay muted loop playsinline>
                <source src="media/isoclines_animation.webm" type="video/webm">
            </video>
        </div>
        <!-- 4. Arrows + isoclines (middle-left) -->
        <div class="float-item" style="top:38%; left:5%; width:190px; height:150px;">
            <video autoplay muted loop playsinline>
                <source src="media/arrows_isoclines_smaller.webm" type="video/webm">
            </video>
        </div>
        <!-- 5. Solutions on vector field (middle-right) -->
        <div class="float-item" style="top:35%; left:60%; width:200px; height:200px;">
            <img src="media/solutions_field.gif" alt="solutions field">
        </div>
        <!-- 6. String art envelope (bottom-left) -->
        <div class="float-item" style="top:65%; left:8%; width:180px; height:180px;">
            <img src="media/string_art_envelope.jpg" alt="string art">
        </div>
        <!-- 7. Envelope family of lines (bottom-right) -->
        <div class="float-item" style="top:60%; left:50%; width:190px; height:190px;">
            <img src="media/envelope_family_lines_animation.gif" alt="envelope">
        </div>
    </div>

    <!-- Content iframe (for scheduled pages 2-4) -->
    <div id="content-area">
        <iframe id="content-iframe" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
    </div>

    <!-- Progress bar -->
    <div id="progress-bar"></div>

    <script>
        var vid = document.getElementById('vid');
        var hint = document.getElementById('hint');
        var floater = document.getElementById('floating-video');
        var controls = document.getElementById('vid-controls');
        var btnMute = document.getElementById('btn-mute');
        var bgIframe = document.getElementById('bg-iframe');
        var iframe = document.getElementById('content-iframe');
        var mediaOverlay = document.getElementById('media-overlay');
        var floatItems = document.querySelectorAll('.float-item');
        var progressBar = document.getElementById('progress-bar');

        // --- Schedule (pages 2-4 use content iframe) ---
        var schedule = [
            {
                url: 'https://shir-openu.github.io/direction_field_3/',
                open: 58, close: 73,
                scrollHalf: false
            },
            {
                url: 'https://shir-openu.github.io/ODE-20218-2nd-DF7/',
                open: 74, close: 84,
                scrollHalf: false
            },
            {
                url: 'https://shir-openu.github.io/2021c-75-Q8/',
                open: 85, close: 98,
                scrollHalf: true
            }
        ];

        // --- Media overlay timing (first timestamp) ---
        var mediaOpen = 35;
        var mediaClose = 55;
        var mediaShowing = false;

        var currentSlide = -1;
        var scrollDone = {};

        vid.addEventListener('timeupdate', function() {
            var t = vid.currentTime;
            var duration = vid.duration || 105;

            // Progress bar
            progressBar.style.width = ((t / duration) * 100) + '%';

            // --- Floating media overlay (0:35 - 0:55) ---
            if (t >= mediaOpen && t < mediaClose) {
                if (!mediaShowing) {
                    mediaShowing = true;
                    mediaOverlay.style.display = 'block';
                    // Stagger fade-in
                    for (var m = 0; m < floatItems.length; m++) {
                        (function(item, delay) {
                            setTimeout(function() { item.classList.add('visible'); }, delay);
                        })(floatItems[m], m * 200);
                    }
                    // Start webm videos
                    var vids = mediaOverlay.querySelectorAll('video');
                    for (var v = 0; v < vids.length; v++) { vids[v].play(); }
                }
            } else {
                if (mediaShowing) {
                    mediaShowing = false;
                    for (var m2 = 0; m2 < floatItems.length; m2++) {
                        floatItems[m2].classList.remove('visible');
                    }
                    setTimeout(function() { mediaOverlay.style.display = 'none'; }, 800);
                }
            }

            // --- Scheduled pages (iframe) ---
            var activeSlide = -1;
            for (var i = 0; i < schedule.length; i++) {
                if (t >= schedule[i].open && t < schedule[i].close) {
                    activeSlide = i;
                    break;
                }
            }

            if (activeSlide !== currentSlide) {
                currentSlide = activeSlide;
                if (activeSlide >= 0) {
                    iframe.src = schedule[activeSlide].url;
                    iframe.style.display = 'block';
                    bgIframe.style.display = 'none';

                    if (schedule[activeSlide].scrollHalf && !scrollDone[activeSlide]) {
                        scrollDone[activeSlide] = true;
                        setTimeout(function() {
                            try {
                                var doc = iframe.contentDocument || iframe.contentWindow.document;
                                var scrollTarget = Math.round(doc.documentElement.scrollHeight / 2);
                                var current = 0;
                                var step = Math.max(1, Math.round(scrollTarget / 60));
                                var scrollInterval = setInterval(function() {
                                    current += step;
                                    if (current >= scrollTarget) {
                                        iframe.contentWindow.scrollTo(0, scrollTarget);
                                        clearInterval(scrollInterval);
                                    } else {
                                        iframe.contentWindow.scrollTo(0, current);
                                    }
                                }, 30);
                            } catch(e) {}
                        }, 2000);
                    }
                } else {
                    iframe.style.display = 'none';
                    iframe.src = 'about:blank';
                    bgIframe.style.display = 'block';
                }
            }
        });

        // --- Unmute on first interaction ---
        function unmuteOnce() {
            vid.muted = false;
            btnMute.textContent = '🔊';
            hint.style.opacity = '0';
            setTimeout(function() { hint.style.display = 'none'; }, 500);
            document.removeEventListener('click', unmuteOnce);
            document.removeEventListener('keydown', unmuteOnce);
            document.removeEventListener('touchstart', unmuteOnce);
        }
        document.addEventListener('click', unmuteOnce);
        document.addEventListener('keydown', unmuteOnce);
        document.addEventListener('touchstart', unmuteOnce);

        // --- Mute/Unmute ---
        btnMute.addEventListener('click', function(e) {
            e.stopPropagation();
            vid.muted = !vid.muted;
            btnMute.textContent = vid.muted ? '🔇' : '🔊';
        });

        // --- Draggable ---
        var isDragging = false, dragOffX, dragOffY;
        floater.addEventListener('mousedown', function(e) {
            if (e.target.tagName === 'BUTTON') return;
            isDragging = true;
            var rect = floater.getBoundingClientRect();
            dragOffX = e.clientX - rect.left;
            dragOffY = e.clientY - rect.top;
            floater.style.cursor = 'grabbing';
            e.preventDefault();
        });
        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            floater.style.left = (e.clientX - dragOffX) + 'px';
            floater.style.top = (e.clientY - dragOffY) + 'px';
            floater.style.right = 'auto';
            controls.style.left = (e.clientX - dragOffX) + 'px';
            controls.style.top = (e.clientY - dragOffY + 182) + 'px';
            controls.style.right = 'auto';
        });
        document.addEventListener('mouseup', function() {
            isDragging = false;
            floater.style.cursor = 'grab';
        });
    </script>
</body>
</html>
