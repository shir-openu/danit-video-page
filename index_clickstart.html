<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background: transparent;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* --- Floating Danit video --- */
        #floating-video {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 220px;
            height: 220px;
            z-index: 999999;
            cursor: pointer;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            border: 3px solid #fff;
            transition: box-shadow 0.3s;
        }
        #floating-video:hover { box-shadow: 0 6px 36px rgba(100,100,255,0.6); }
        #floating-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* --- Teaser overlay (before click) --- */
        #teaser-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.35);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            cursor: pointer;
            transition: opacity 0.5s;
        }
        #teaser-overlay .pulse-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 1.8s ease-in-out infinite;
            position: relative;
        }
        #teaser-overlay .pulse-ring::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.4);
            animation: ripple 1.8s ease-out infinite;
        }
        #teaser-overlay .play-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 14px 0 14px 24px;
            border-color: transparent transparent transparent #fff;
            margin-left: 4px;
        }
        #teaser-overlay .teaser-text {
            color: #fff;
            font-size: 15px;
            margin-top: 10px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.7);
            animation: fadeText 2.5s ease-in-out infinite;
            text-align: center;
            direction: rtl;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            50% { transform: scale(1.08); box-shadow: 0 0 20px 8px rgba(255,255,255,0.15); }
        }
        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        @keyframes fadeText {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        #floating-video.waiting {
            animation: bounce 2s ease-in-out infinite;
        }

        /* --- Drag hint --- */
        #drag-hint {
            position: fixed;
            top: 240px;
            right: 16px;
            width: 220px;
            text-align: center;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 13px;
            z-index: 999999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            direction: rtl;
        }

        /* Demo wiggle after start */
        @keyframes wiggle {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-15px, 8px); }
            40% { transform: translate(10px, -5px); }
            60% { transform: translate(-8px, 12px); }
            80% { transform: translate(5px, -3px); }
            100% { transform: translate(0, 0); }
        }
        #floating-video.wiggle {
            animation: wiggle 1.5s ease-in-out;
        }

        /* --- Controls (hidden until playing) --- */
        #vid-controls {
            position: fixed;
            top: 198px;
            right: 16px;
            z-index: 1000000;
            display: none;
            gap: 4px;
        }
        #vid-controls button {
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 14px;
            line-height: 28px;
            text-align: center;
        }
        #vid-controls button:hover { background: rgba(0,0,0,0.85); }

        /* --- Background iframe --- */
        #bg-iframe {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 0;
        }

        /* --- Content iframe --- */
        #content-area {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1;
        }
        #content-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            display: none;
        }

        /* --- Floating media overlay --- */
        #media-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 500;
            display: none;
            pointer-events: none;
            overflow: hidden;
        }
        .float-item {
            position: absolute;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.8s ease-in;
            background: #fff;
            padding: 6px;
        }
        .float-item.visible { opacity: 1; }
        .float-item img, .float-item video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #fff;
        }
        @keyframes floatA { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes floatB { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes floatC { 0%,100% { transform: translateY(-5px); } 50% { transform: translateY(7px); } }
        .float-item:nth-child(1) { animation: floatA 4s ease-in-out infinite; }
        .float-item:nth-child(2) { animation: floatB 5s ease-in-out infinite 0.5s; }
        .float-item:nth-child(3) { animation: floatC 4.5s ease-in-out infinite 1s; }
        .float-item:nth-child(4) { animation: floatA 5.5s ease-in-out infinite 0.3s; }
        .float-item:nth-child(5) { animation: floatB 4.2s ease-in-out infinite 0.8s; }
        .float-item:nth-child(6) { animation: floatC 5s ease-in-out infinite 0.2s; }
        .float-item:nth-child(7) { animation: floatA 4.8s ease-in-out infinite 0.6s; }

        /* --- Progress bar --- */
        #progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 4px;
            background: #6366f1;
            z-index: 999999;
            transition: width 0.3s;
            width: 0%;
        }
    </style>
</head>
<body>
    <!-- Floating Danit -->
    <div id="floating-video" class="waiting">
        <video id="vid" playsinline preload="auto" poster="thumbnail.jpg">
            <source src="danit_hila_message_hedra.mp4" type="video/mp4">
        </video>
        <div id="teaser-overlay">
            <div class="pulse-ring">
                <div class="play-icon"></div>
            </div>
            <div class="teaser-text">לחצו לשמוע אותי</div>
        </div>
    </div>
    <div id="vid-controls">
        <button id="btn-mute" title="Mute/Unmute">🔊</button>
    </div>
    <div id="drag-hint">אפשר לגרור אותי לכל מקום</div>

    <!-- Default background -->
    <iframe id="bg-iframe"
            src="https://shir-openu.github.io/example_second_order_direction_field_enrichment/"
            sandbox="allow-scripts allow-same-origin allow-popups"></iframe>

    <!-- Floating media overlay (0:35 - 0:55) -->
    <div id="media-overlay">
        <div class="float-item" style="top:1%; left:1%; width:300px; height:300px;">
            <img src="media/paraboloid_heatmap.png" alt="">
        </div>
        <div class="float-item" style="top:2%; left:25%; width:280px; height:220px;">
            <video autoplay muted loop playsinline>
                <source src="media/paraboloid_sections.webm" type="video/webm">
            </video>
        </div>
        <div class="float-item" style="top:1%; left:50%; width:270px; height:220px;">
            <video autoplay muted loop playsinline>
                <source src="media/isoclines_animation.webm" type="video/webm">
            </video>
        </div>
        <div class="float-item" style="top:40%; left:2%; width:300px; height:240px;">
            <video autoplay muted loop playsinline>
                <source src="media/arrows_isoclines_smaller.webm" type="video/webm">
            </video>
        </div>
        <div class="float-item" style="top:35%; left:48%; width:320px; height:320px;">
            <img src="media/solutions_field.gif" alt="">
        </div>
        <div class="float-item" style="top:62%; left:2%; width:280px; height:280px;">
            <img src="media/string_art_envelope.jpg" alt="">
        </div>
        <div class="float-item" style="top:58%; left:40%; width:300px; height:300px;">
            <img src="media/envelope_family_lines_animation.gif" alt="">
        </div>
    </div>

    <!-- Content iframe -->
    <div id="content-area">
        <iframe id="content-iframe" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
    </div>

    <!-- Progress bar -->
    <div id="progress-bar"></div>

    <script>
        var vid = document.getElementById('vid');
        var floater = document.getElementById('floating-video');
        var controls = document.getElementById('vid-controls');
        var btnMute = document.getElementById('btn-mute');
        var teaserOverlay = document.getElementById('teaser-overlay');
        var bgIframe = document.getElementById('bg-iframe');
        var iframe = document.getElementById('content-iframe');
        var mediaOverlay = document.getElementById('media-overlay');
        var floatItems = document.querySelectorAll('.float-item');
        var progressBar = document.getElementById('progress-bar');
        var dragHint = document.getElementById('drag-hint');
        var started = false;

        // --- Click to start (with sound, from beginning) ---
        teaserOverlay.addEventListener('click', function(e) {
            e.stopPropagation();
            if (started) return;
            started = true;
            vid.currentTime = 0;
            vid.muted = false;
            vid.play();
            teaserOverlay.style.opacity = '0';
            setTimeout(function() { teaserOverlay.style.display = 'none'; }, 500);
            floater.classList.remove('waiting');
            floater.style.cursor = 'grab';
            controls.style.display = 'flex';

            // Show drag hint + wiggle after 2 seconds
            setTimeout(function() {
                dragHint.style.opacity = '1';
                floater.classList.add('wiggle');
                floater.addEventListener('animationend', function() {
                    floater.classList.remove('wiggle');
                }, { once: true });
                // Hide drag hint after 4 seconds
                setTimeout(function() {
                    dragHint.style.opacity = '0';
                }, 4000);
            }, 2000);
        });

        // --- Schedule ---
        var schedule = [
            { url: 'https://shir-openu.github.io/direction_field_3/', open: 58, close: 73, scrollHalf: false },
            { url: 'https://shir-openu.github.io/ODE-20218-2nd-DF7/', open: 74, close: 84, scrollHalf: false },
            { url: 'https://shir-openu.github.io/2021c-75-Q8/', open: 85, close: 98, scrollHalf: true }
        ];

        var mediaOpen = 35, mediaClose = 55;
        var mediaShowing = false;
        var currentSlide = -1;
        var scrollDone = {};

        vid.addEventListener('timeupdate', function() {
            var t = vid.currentTime;
            var duration = vid.duration || 105;
            progressBar.style.width = ((t / duration) * 100) + '%';

            // --- Media overlay ---
            if (t >= mediaOpen && t < mediaClose) {
                if (!mediaShowing) {
                    mediaShowing = true;
                    mediaOverlay.style.display = 'block';
                    for (var m = 0; m < floatItems.length; m++) {
                        (function(item, delay) {
                            setTimeout(function() { item.classList.add('visible'); }, delay);
                        })(floatItems[m], m * 200);
                    }
                    var mvids = mediaOverlay.querySelectorAll('video');
                    for (var v = 0; v < mvids.length; v++) { mvids[v].play(); }
                }
            } else {
                if (mediaShowing) {
                    mediaShowing = false;
                    for (var m2 = 0; m2 < floatItems.length; m2++) {
                        floatItems[m2].classList.remove('visible');
                    }
                    setTimeout(function() { mediaOverlay.style.display = 'none'; }, 800);
                }
            }

            // --- Scheduled pages ---
            var activeSlide = -1;
            for (var i = 0; i < schedule.length; i++) {
                if (t >= schedule[i].open && t < schedule[i].close) {
                    activeSlide = i;
                    break;
                }
            }
            if (activeSlide !== currentSlide) {
                currentSlide = activeSlide;
                if (activeSlide >= 0) {
                    iframe.src = schedule[activeSlide].url;
                    iframe.style.display = 'block';
                    bgIframe.style.display = 'none';
                    if (schedule[activeSlide].scrollHalf && !scrollDone[activeSlide]) {
                        scrollDone[activeSlide] = true;
                        setTimeout(function() {
                            try {
                                var doc = iframe.contentDocument || iframe.contentWindow.document;
                                var scrollTarget = Math.round(doc.documentElement.scrollHeight / 2);
                                var cur = 0;
                                var step = Math.max(1, Math.round(scrollTarget / 60));
                                var si = setInterval(function() {
                                    cur += step;
                                    if (cur >= scrollTarget) {
                                        iframe.contentWindow.scrollTo(0, scrollTarget);
                                        clearInterval(si);
                                    } else {
                                        iframe.contentWindow.scrollTo(0, cur);
                                    }
                                }, 30);
                            } catch(e) {}
                        }, 2000);
                    }
                } else {
                    iframe.style.display = 'none';
                    iframe.src = 'about:blank';
                    bgIframe.style.display = 'block';
                }
            }
        });

        // --- Mute/Unmute ---
        btnMute.addEventListener('click', function(e) {
            e.stopPropagation();
            vid.muted = !vid.muted;
            btnMute.textContent = vid.muted ? '🔇' : '🔊';
        });

        // --- Draggable (only after started) ---
        var isDragging = false, dragOffX, dragOffY;
        floater.addEventListener('mousedown', function(e) {
            if (!started || e.target.tagName === 'BUTTON') return;
            isDragging = true;
            var rect = floater.getBoundingClientRect();
            dragOffX = e.clientX - rect.left;
            dragOffY = e.clientY - rect.top;
            floater.style.cursor = 'grabbing';
            e.preventDefault();
        });
        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            floater.style.left = (e.clientX - dragOffX) + 'px';
            floater.style.top = (e.clientY - dragOffY) + 'px';
            floater.style.right = 'auto';
            controls.style.left = (e.clientX - dragOffX) + 'px';
            controls.style.top = (e.clientY - dragOffY + 182) + 'px';
            controls.style.right = 'auto';
        });
        document.addEventListener('mouseup', function() {
            isDragging = false;
            if (started) floater.style.cursor = 'grab';
        });
    </script>
</body>
</html>
